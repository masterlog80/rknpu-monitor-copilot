services:
  rknpu-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: rknpu-monitor:latest
    container_name: rknpu-monitor
    restart: unless-stopped

    # ── Networking ────────────────────────────────────────────────────────────
    ports:
      - "${HOST_PORT:-8080}:5000"

    # ── Privileged access for NPU debug interface ─────────────────────────────
    # debugfs (/sys/kernel/debug) on RK3566 typically requires privileged mode.
    # If your kernel/distro supports it you can replace this with a narrower
    # capability: cap_add: [SYS_ADMIN]
    privileged: true

    # ── Mount the NPU debug filesystem ───────────────────────────────────────
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - rknpu-data:/data

    # ── Environment variables ─────────────────────────────────────────────────
    environment:
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - RETENTION_DAYS=${RETENTION_DAYS:-14}
      - DB_PATH=/data/metrics.db
      - NPU_LOAD_PATH=/sys/kernel/debug/rknpu/load
      - HOST=0.0.0.0
      - PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    # ── Healthcheck ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  rknpu-data:
    driver: local
