<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c44569;stop-opacity:0.2" />
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="50" cy="50" r="48" fill="url(#glowGradient)" opacity="0.6"/>

  <!-- Background -->
  <rect width="100" height="100" fill="#0f1117" rx="10"/>

  <!-- CPU Die with gradient (center square) -->
  <rect x="28" y="28" width="44" height="44" fill="url(#cpuGradient)" stroke="#ff6b9d" stroke-width="2.5" rx="5"/>

  <!-- Inner glow on CPU die -->
  <rect x="28" y="28" width="44" height="44" fill="none" stroke="#ffd700" stroke-width="1" rx="5" opacity="0.5"/>

  <!-- Core sections with different colors -->
  <rect x="32" y="32" width="18" height="18" fill="#ff6b9d" opacity="0.8" rx="2"/>
  <rect x="52" y="32" width="18" height="18" fill="#ffa500" opacity="0.8" rx="2"/>
  <rect x="32" y="52" width="18" height="18" fill="#00ff88" opacity="0.8" rx="2"/>
  <rect x="52" y="52" width="18" height="18" fill="#00d4ff" opacity="0.8" rx="2"/>

  <!-- Highlights on cores -->
  <circle cx="38" cy="38" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="58" cy="38" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="38" cy="58" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="58" cy="58" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Connection lines between cores -->
  <line x1="50" y1="41" x2="50" y2="59" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="41" y1="50" x2="59" y2="50" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>

  <!-- CPU Pins (left) - red/orange -->
  <rect x="12" y="34" width="14" height="6" fill="#ff4757" stroke="#ff1744" stroke-width="1" rx="2"/>
  <rect x="12" y="47" width="14" height="6" fill="#ff4757" stroke="#ff1744" stroke-width="1" rx="2"/>
  <rect x="12" y="60" width="14" height="6" fill="#ff4757" stroke="#ff1744" stroke-width="1" rx="2"/>

  <!-- CPU Pins (right) - red/orange -->
  <rect x="74" y="34" width="14" height="6" fill="#ff4757" stroke="#ff1744" stroke-width="1" rx="2"/>
  <rect x="74" y="47" width="14" height="6" fill="#ff4757" stroke="#ff1744" stroke-width="1" rx="2"/>
  <rect x="74" y="60" width="14" height="6" fill="#ff4757" stroke="#ff1744" stroke-width="1" rx="2"/>

  <!-- CPU Pins (top) - cyan/blue -->
  <rect x="34" y="12" width="6" height="14" fill="#00d4ff" stroke="#0099cc" stroke-width="1" rx="2"/>
  <rect x="47" y="12" width="6" height="14" fill="#00d4ff" stroke="#0099cc" stroke-width="1" rx="2"/>
  <rect x="60" y="12" width="6" height="14" fill="#00d4ff" stroke="#0099cc" stroke-width="1" rx="2"/>

  <!-- CPU Pins (bottom) - green/lime -->
  <rect x="34" y="74" width="6" height="14" fill="#00ff88" stroke="#00cc66" stroke-width="1" rx="2"/>
  <rect x="47" y="74" width="6" height="14" fill="#00ff88" stroke="#00cc66" stroke-width="1" rx="2"/>
  <rect x="60" y="74" width="6" height="14" fill="#00ff88" stroke="#00cc66" stroke-width="1" rx="2"/>

  <!-- Decorative accent lines -->
  <line x1="26" y1="50" x2="28" y2="50" stroke="#ff6b9d" stroke-width="1.5" opacity="0.6"/>
  <line x1="72" y1="50" x2="74" y2="50" stroke="#ff6b9d" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="26" x2="50" y2="28" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="72" x2="50" y2="74" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
</svg>
