<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RK3566 Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="/static/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent-cpu: #4ade80;
      --accent-mem: #60a5fa;
      --accent-npu: #f97316;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header h1 span { color: var(--accent-npu); }

    #status {
      font-size: 0.78rem;
      padding: 0.3rem 0.8rem;
      border-radius: 99px;
      font-weight: 600;
      background: #1e3a2f;
      color: var(--accent-cpu);
      border: 1px solid #2d5a42;
      transition: background 0.3s;
    }

    #status.error { background: #3a1e1e; color: #f87171; border-color: #5a2d2d; }

    /* ── Gauge cards ── */
    .gauges {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .gauge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      text-align: center;
    }

    .gauge-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .gauge-card .value {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }

    .gauge-card.cpu  .value { color: var(--accent-cpu); }
    .gauge-card.mem  .value { color: var(--accent-mem); }
    .gauge-card.npu  .value { color: var(--accent-npu); }

    .gauge-card .sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── Chart ── */
    #chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      min-height: 350px;
    }

    canvas { display: block; max-height: 300px; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.5rem 1rem;
      background: var(--accent-cpu);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      font-size: 0.9rem;
    }

    button:hover { opacity: 0.8; }
    button:active { opacity: 0.7; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    @media (max-width: 640px) {
      header { flex-direction: column; align-items: flex-start; }
      .gauges { grid-template-columns: 1fr; }
      #chart-container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>RK3566 <span>Monitor</span></h1>
    <div id="status">Connecting...</div>
  </header>

  <div class="gauges">
    <div class="gauge-card cpu">
      <div class="label">CPU</div>
      <div class="value" id="cpu-value">—</div>
      <div class="sub" id="cpu-sub"></div>
    </div>
    <div class="gauge-card mem">
      <div class="label">Memory</div>
      <div class="value" id="mem-value">—</div>
      <div class="sub" id="mem-sub"></div>
    </div>
    <div class="gauge-card npu">
      <div class="label">NPU</div>
      <div class="value" id="npu-value">—</div>
      <div class="sub" id="npu-sub"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="loadRange(1)">1h</button>
    <button onclick="loadRange(6)">6h</button>
    <button onclick="loadRange(24)">24h</button>
    <button onclick="loadRange(168)">1w</button>
    <button onclick="exportMetrics()">Export CSV</button>
  </div>

  <div id="chart-container">
    <canvas id="myChart"></canvas>
  </div>

  <footer>
    <p>RK3566 / OrangePi CM4 Monitor • Auto-refreshes every <span id="interval">10</span>s</p>
  </footer>

  <script>
    const CONFIG = {};
    let chart = null;

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        Object.assign(CONFIG, await res.json());
        document.getElementById('interval').textContent = CONFIG.poll_interval || 10;
      } catch (e) {
        console.error('Failed to load config:', e);
      }
    }

    async function loadLatest() {
      try {
        const res = await fetch('/api/metrics/latest');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        document.getElementById('cpu-value').textContent = data.cpu.toFixed(1) + '%';
        document.getElementById('mem-value').textContent = data.memory.toFixed(1) + '%';
        document.getElementById('npu-value').textContent = data.npu.toFixed(1) + '%';
        document.getElementById('status').textContent = '✓ Connected';
        document.getElementById('status').classList.remove('error');
      } catch (e) {
        document.getElementById('status').textContent = '✗ Error';
        document.getElementById('status').classList.add('error');
        console.error('Failed to load latest:', e);
      }
    }

    async function loadRange(hours) {
      try {
        const res = await fetch(`/api/metrics/history?hours=${hours}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        updateChart(data);
      } catch (e) {
        console.error('Failed to load range:', e);
      }
    }

    function updateChart(data) {
      const labels = data.map(d => {
        const date = new Date(d.timestamp + 'Z');
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      });

      const datasets = [
        {
          label: 'CPU',
          data: data.map(d => d.cpu),
          borderColor: 'rgb(74, 222, 128)',
          backgroundColor: 'rgba(74, 222, 128, 0.1)',
          tension: 0.3,
          fill: true,
        },
        {
          label: 'Memory',
          data: data.map(d => d.memory),
          borderColor: 'rgb(96, 165, 250)',
          backgroundColor: 'rgba(96, 165, 250, 0.1)',
          tension: 0.3,
          fill: true,
        },
        {
          label: 'NPU',
          data: data.map(d => d.npu),
          borderColor: 'rgb(249, 115, 22)',
          backgroundColor: 'rgba(249, 115, 22, 0.1)',
          tension: 0.3,
          fill: true,
        },
      ];

      const ctx = document.getElementById('myChart').getContext('2d');
      
      if (chart) chart.destroy();
      
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#e2e8f0', font: { size: 12 } },
            },
          },
          scales: {
            y: {
              min: 0,
              max: 100,
              ticks: { color: '#94a3b8' },
              grid: { color: '#2a2d3a' },
            },
            x: {
              ticks: { color: '#94a3b8' },
              grid: { color: '#2a2d3a' },
            },
          },
        },
      });
    }

    async function exportMetrics() {
      const hours = prompt('Export last N hours (default 24):', '24');
      if (hours === null) return;
      
      const h = parseInt(hours) || 24;
      window.location.href = `/api/metrics/export?hours=${h}`;
    }

    async function init() {
      await loadConfig();
      await loadLatest();
      await loadRange(1);
      
      setInterval(loadLatest, (CONFIG.poll_interval || 10) * 1000);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
